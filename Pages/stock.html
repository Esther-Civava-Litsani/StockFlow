<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Caisse</title>
    <link rel="stylesheet" href="../css/caisse.css">
    <!-- Lien vers Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> 
</head>
<body>
    <!-- Barre latérale de navigation -->
    <div class="barre"> 
        <!-- Logo -->
        <div class="logo">
            <img src="../Logo/logo.png" alt="Logo StockFlow">
            <span>StockFlow</span> 
        </div>
        <!-- Éléments du menu -->
        <a href="accueil.html" class="Menu "><i class="fas fa-home"></i> Accueil</a>
        <a href="caisse.html" class="Menu"><i class="fas fa-cash-register"></i> Caisse</a>
        <a href="stock.html" class="Menu active"><i class="fas fa-boxes"></i> Stock</a>
        <a href="magasin.html" class="Menu "><i class="fas fa-store"></i> Magasin</a>
        <br><br>
        <!-- Bouton de déconnexion -->
        <a href="deconnexion.html" class="Menu" onclick="confirmerDeconnexion(event)"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </div>
    <!-- Contenu principal de la page -->
    <div class="principal">
        <small>Stock <i class="fas fa-boxes"></i></small>
        <!-- Carte pour le formulaire -->
        <div class="ajouter-produit">
            <h2>Ajouter un produit</h2>
            <!-- Grille de formulaire -->
            <div class="grilleFormulaire"> 
                <input type="text" id="nom" placeholder="Nom du produit">
                <input type="number" id="achat" placeholder="Prix achat">
                <input type="number" id="vente" placeholder="Prix vente">
                <input type="number" id="quantite" placeholder="Quantité">
                <input type="date" id="expiration">
            </div> 
            <button id="ajouter-btn">Ajouter le produit</button>
            <p>ID et code produit générés automatiquement</p>
        </div>
        <!-- Carte pour la liste des produits -->
        <div class="liste">
            <div class="recherche">
                <h2>Liste des produits</h2>
                <input type="text" placeholder= "Rechercher un produit...">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th> <!--EX LE PREMIER PRODUIT SERA 1, LE DEUXIÈME SERA 2, ETC -->
                        <th>Code produit</th> <!--EX  PRODUIT aura les 3premiere letre du nom en majuscule suivi d'un numéro de 4CHIFFRES en ordre de saisie -->
                        <th>Produit</th> 
                        <th>Prix achat</th>
                        <th>Prix vente</th>
                        <th>Bénéfice</th>
                        <th>Quantité</th>
                        <th>Expiration</th> 
                    </tr>
                </thead>
                <tbody id="tableProduits"></tbody> 
            </table> 
        </div>
    </div>    
    <script src="../js/stock.js"></script>
</body>
</html>
