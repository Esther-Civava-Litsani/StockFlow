<!DOCTYPE html> <!-- Déclaration du type de document HTML -->
<html lang="fr"> <!-- Élément racine HTML avec langue française -->
<head> <!-- Section d'en-tête du document -->
    <meta charset="UTF-8"> <!-- Encodage des caractères en UTF-8 -->
    <title>StockFlow - Caisse</title> <!-- Titre de la page -->
    <link rel="stylesheet" href="../css/caisse.css"> <!-- Lien vers la feuille de style CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Lien vers Font Awesome pour les icônes -->
</head> <!-- Fin de la section head -->
<body> <!-- Corps du document -->

<!-- Barre latérale de navigation -->
<div class="barreLaterale"> <!-- Conteneur de la barre latérale -->
    <!-- Logo de l'application -->
    <div class="logo"> <!-- Conteneur du logo -->
        <img src="../Logo/logo.png" alt="Logo StockFlow"> <!-- Image du logo -->
        <span>StockFlow</span> <!-- Texte du logo -->
    </div> <!-- Fin du conteneur logo -->

    <!-- Éléments du menu -->
    <a href="accueil.html" class="elementMenu"><i class="fas fa-home"></i> Accueil</a> <!-- Élément menu pour Accueil -->
    <a href="caisse.html" class="elementMenu active"><i class="fas fa-cash-register"></i> Caisse</a> <!-- Élément menu actif pour Caisse -->
    <a href="stock.html" class="elementMenu"><i class="fas fa-boxes"></i> Stock</a> <!-- Élément menu pour Stock -->
    <a href="magasin.html" class="elementMenu"><i class="fas fa-store"></i> Magasin</a> <!-- Élément menu pour Magasin -->

    <br><br> <!-- Sauts de ligne pour espacement -->
    <!-- Bouton de déconnexion -->
    <div class="elementMenu" onclick="confirmerDeconnexion(event)"><i class="fas fa-sign-out-alt"></i> Déconnexion</div> <!-- Élément menu pour Déconnexion -->
</div> <!-- Fin de la barre latérale -->

<!-- Contenu principal de la page -->
<div class="principal"> <!-- Conteneur principal -->

    <h2>Caisse</h2> <!-- Titre de la page -->

    <div class="conteneur"> <!-- Conteneur principal pour la mise en page -->

        <!-- Partie gauche -->
        <div class="gauche"> <!-- Section gauche -->

            <!-- Ajout de produit -->
            <div class="carte"> <!-- Carte pour ajouter un produit -->
                <h3>Ajouter un produit</h3> <!-- Titre de la carte -->

                <input type="text" id="code" placeholder="Scanner ou saisir code"> <!-- Champ de saisie pour le code -->
                <button id="ajouter-btn">Ajouter</button> <!-- Bouton pour ajouter -->

                <br><br> <!-- Sauts de ligne -->

                <input type="number" id="quantite" value="1" min="1"> <!-- Champ pour la quantité -->
            </div> <!-- Fin de la carte -->

            <!-- Panier -->
            <div class="carte"> <!-- Carte pour le panier -->
                <h3>Panier</h3> <!-- Titre de la carte -->
                <div id="panier"></div> <!-- Conteneur pour le panier -->
            </div> <!-- Fin de la carte -->

        </div> <!-- Fin de la partie gauche -->

        <!-- Partie droite -->
        <div class="droite"> <!-- Section droite -->

            <!-- Total -->
            <div class="carte"> <!-- Carte pour le total -->
                <h3>Total du jour</h3> <!-- Titre de la carte -->
                <h2 id="total">0€</h2> <!-- Affichage du total -->
                <button id="fin-journee-btn">Fin de journée</button> <!-- Bouton pour fin de journée -->
            </div> <!-- Fin de la carte -->

            <!-- Historique -->
            <div class="carte"> <!-- Carte pour l'historique -->
                <h3>Historique</h3> <!-- Titre de la carte -->
                <div id="historique"></div> <!-- Conteneur pour l'historique -->
            </div> <!-- Fin de la carte -->

        </div> <!-- Fin de la partie droite -->

    </div> <!-- Fin du conteneur -->

</div> <!-- Fin du contenu principal -->

<!-- Inclusion du script JavaScript -->
<script src="../js/common.js"></script> <!-- Script partagé pour la connexion et la déconnexion -->
<script src="../js/caisse.js"></script> <!-- Script JavaScript pour la page -->
</body> <!-- Fin du corps -->
</html> <!-- Fin du document HTML -->
