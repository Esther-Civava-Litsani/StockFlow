<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Accueil</title>
    <link rel="stylesheet" href="../css/accueil.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="../Logo/logo.png" alt="Logo StockFlow">
        <span>StockFlow</span>
    </div>

    <div class="menu-item active">🏠 Accueil</div>
    <div class="menu-item" onclick="window.location.href='caisse.html'">💰 Caisse</div>
    <div class="menu-item" onclick="window.location.href='stock.html'">📦 Stock</div>
    <div class="menu-item" onclick="window.location.href='magasin.html'">🏪 Magasin</div>

    <br><br>
    <div class="menu-item" onclick="localStorage.removeItem('boutique'); window.location.href='connexion.html'">🚪 Déconnexion</div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <small>Bonjour 👋</small>
        <h1 id="nomBoutique">Nom de la boutique</h1>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <div class="card-title">PRODUITS</div>
            <div class="card-value" id="produits">0</div>
        </div>

        <div class="card">
            <div class="card-title">VENTES AUJOURD'HUI</div>
            <div class="card-value" id="ventes">0</div>
        </div>

        <div class="card">
            <div class="card-title">RECETTE DU JOUR</div>
            <div class="card-value" id="recette">0</div>
        </div>

    </div>

    <!-- SECTIONS -->
    <div class="sections">

        <div class="box">
            <div class="box-title">⚠️ Ruptures de stock</div>
            <div id="ruptures"></div>
        </div>

        <div class="box">
            <div class="box-title">⏰ Bientôt expirés</div>
            <div id="expires"></div>
        </div>

    </div>

</div>

<script src="../js/accueil.js"></script>
</body>
</html>
