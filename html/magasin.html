<!DOCTYPE html> <!-- Déclaration du type de document HTML -->
<html lang="fr"> <!-- Élément racine HTML avec langue française -->
<head> <!-- Section d'en-tête du document -->
    <meta charset="UTF-8"> <!-- Encodage des caractères en UTF-8 -->
    <title>StockFlow - Magasin</title> <!-- Titre de la page -->
    <link rel="stylesheet" href="../css/magasin.css"> <!-- Lien vers la feuille de style CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Lien vers Font Awesome pour les icônes -->
</head> <!-- Fin de la section head -->
<body> <!-- Corps du document -->

<!-- Barre latérale de navigation -->
<div class="barreLaterale"> <!-- Conteneur de la barre latérale -->
    <!-- Logo de l'application -->
    <div class="logo"> <!-- Conteneur du logo -->
        <img src="../Logo/logo.png" alt="Logo StockFlow"> <!-- Image du logo -->
        <span>StockFlow</span> <!-- Texte du logo -->
    </div> <!-- Fin du conteneur logo -->

    <!-- Éléments du menu -->
    <div class="elementMenu" onclick="window.location.href='accueil.html'"><i class="fas fa-home"></i> Accueil</div> <!-- Élément menu pour Accueil -->
    <div class="elementMenu" onclick="window.location.href='caisse.html'"><i class="fas fa-cash-register"></i> Caisse</div> <!-- Élément menu pour Caisse -->
    <div class="elementMenu" onclick="window.location.href='stock.html'"><i class="fas fa-boxes"></i> Stock</div> <!-- Élément menu pour Stock -->
    <div class="elementMenu active"><i class="fas fa-store"></i> Magasin</div> <!-- Élément menu actif pour Magasin -->

    <br><br> <!-- Sauts de ligne pour espacement -->
    <!-- Bouton de déconnexion -->
    <div class="elementMenu" onclick="localStorage.removeItem('boutique'); window.location.href='connexion.html'"><i class="fas fa-sign-out-alt"></i> Déconnexion</div> <!-- Élément menu pour Déconnexion -->
</div> <!-- Fin de la barre latérale -->

<!-- Contenu principal de la page -->
<div class="principal"> <!-- Conteneur principal -->
    <!-- En-tête de la page -->
    <div class="entete"> <!-- Conteneur de l'en-tête -->
        <small>Bonjour <i class="fas fa-hand-paper"></i></small> <!-- Salutation avec icône -->
        <h1 id="nomBoutique">Nom de la boutique</h1> <!-- Titre avec ID pour le nom de la boutique -->
    </div> <!-- Fin de l'en-tête -->

    <!-- Carte principale -->
    <div class="carte"> <!-- Carte pour le contenu -->
        <h2>Magasin</h2> <!-- Titre de la carte -->
        <p>Aucune donnée disponible pour le moment.</p> <!-- Message par défaut -->
    </div> <!-- Fin de la carte -->
</div> <!-- Fin du contenu principal -->

<!-- Inclusion du script JavaScript -->
<script src="../js/magasin.js"></script> <!-- Script JavaScript pour la page -->
</body> <!-- Fin du corps -->
</html> <!-- Fin du document HTML -->
